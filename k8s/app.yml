apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ping-prueba
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TU-USUARIO/TU-REPO
    targetRevision: main
    path: .   # 👈 IMPORTANTE (esto evita el error)
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
